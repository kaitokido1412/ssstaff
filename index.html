<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영진반경측정기</title>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=b1am4s0ypz&submodules=geocoder"></script>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#03C75A;--g2:#00a648;--bg:#0c0e14;--card:#161920;--bd:#222533;--red:#ff4757;--tx:#eef0f5;--mu:#5a6070;--gold:#f59e0b}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{height:52px;background:var(--g);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:999}
.brand{display:flex;align-items:center;white-space:nowrap;flex-shrink:0}
.brand-all{font-family:'Jua',sans-serif;font-size:19px;color:#fff;letter-spacing:-0.5px;text-shadow:2px 2px 0px rgba(0,0,0,0.2);display:flex}
.brand-all span{display:inline-block;animation:bounce 1.2s infinite alternate}
.brand-all span:nth-child(1){animation-delay:.00s}.brand-all span:nth-child(2){animation-delay:.08s}
.brand-all span:nth-child(3){animation-delay:.16s}.brand-all span:nth-child(4){animation-delay:.24s}
.brand-all span:nth-child(5){animation-delay:.32s}.brand-all span:nth-child(6){animation-delay:.40s}
.brand-all span:nth-child(7){animation-delay:.48s}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}
.hs{flex:1;display:flex;gap:6px;margin-left:8px}
.hs input{flex:1;padding:7px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.25);color:#fff;font-size:13px;outline:none;min-width:0}
.hs input::placeholder{color:rgba(255,255,255,.6)}
.hs button{padding:7px 14px;background:#fff;color:var(--g2);border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
#mw{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
.lock-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;background:var(--gold);color:#000;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;pointer-events:none;display:none}
.lock-badge.show{display:block}
.tbs{position:absolute;top:12px;right:10px;z-index:500;display:flex;flex-direction:column;gap:3px}
.tb{padding:5px 10px;background:rgba(12,14,20,.85);backdrop-filter:blur(6px);border:1px solid var(--bd);border-radius:6px;color:var(--mu);font-size:10px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.btns{position:absolute;bottom:14px;right:10px;z-index:500;display:flex;flex-direction:column;gap:6px;align-items:center}
#compass{width:40px;height:40px;pointer-events:none;flex-shrink:0}
#compass svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.ib{width:40px;height:40px;background:rgba(12,14,20,.9);border:1px solid var(--bd);border-radius:50%;color:var(--g);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .2s;flex-shrink:0}
.ib.tracking{background:var(--g);color:#fff;border-color:var(--g)}
.ib.locked{background:var(--gold);color:#000;border-color:var(--gold)}
.ib.on-purple{background:#a855f7;color:#fff;border-color:#a855f7}
.ib.on-blue{background:#2563eb;color:#fff;border-color:#2563eb}
.ib.on-red{background:#ff4757;color:#fff;border-color:#ff4757}
.vote-popup{position:absolute;bottom:14px;left:10px;z-index:600;background:rgba(15,17,23,0.95);border-radius:12px;padding:10px 14px;max-width:240px;display:none;backdrop-filter:blur(10px)}
.vote-popup.show{display:block}
.vote-popup.pre{border:1px solid #2563eb}
.vote-popup.day{border:1px solid #ff4757}
.vp-type{font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.pre .vp-type{color:#2563eb}.day .vp-type{color:#ff4757}
.vp-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.vp-bld{font-size:10px;color:#a0aec0;margin-bottom:2px}
.vp-addr{font-size:10px;color:var(--mu);line-height:1.5}
.vp-time{font-size:10px;color:var(--g);margin-top:4px;font-weight:700}
.vp-dist{font-size:11px;color:var(--gold);margin-top:4px;font-weight:700}
.vp-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer}
#panel{background:var(--card);border-top:2px solid var(--g);flex-shrink:0;padding:12px 14px 10px;display:flex;flex-direction:column;gap:9px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.sb{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:9px 10px}
.sb.hl{border-color:var(--g)}.sb.hl.locked-stat{border-color:var(--gold)}
.sl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:3px}
.sv{font-family:monospace;font-size:14px;font-weight:700;color:var(--tx);line-height:1}
.sb.hl .sv{color:var(--g);font-size:17px}.sb.hl.locked-stat .sv{color:var(--gold)}
.sr{display:flex;flex-direction:column;gap:4px}
.st{display:flex;justify-content:space-between;font-size:10px;color:var(--mu)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--bd);border-radius:4px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--g);border-radius:50%;cursor:pointer;box-shadow:0 0 0 3px rgba(3,199,90,.2)}
input[type=range]:disabled{opacity:.4}
.br{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ps{display:flex;gap:4px;flex-wrap:wrap}
.pb{padding:4px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:12px;color:var(--mu);font-size:10px;cursor:pointer;transition:all .15s}
.pb.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.pb:disabled{opacity:.4;cursor:not-allowed}
.clr{padding:6px 12px;background:transparent;border:1px solid var(--red);border-radius:7px;color:var(--red);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s}
.ci{font-size:9px;color:var(--mu);text-align:center;font-family:monospace}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="brand">
    <div class="brand-all">
      <span>영</span><span>진</span><span>반</span><span>경</span><span>측</span><span>정</span><span>기</span>
    </div>
  </div>
  <div class="hs">
    <input type="text" id="si" placeholder="주소·장소 검색…" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">검색</button>
  </div>
</header>

<div id="mw">
  <div id="map"></div>
  <div class="lock-badge" id="lockBadge">🔒 반경 고정됨</div>
  <div class="tbs">
    <button class="tb on" onclick="setType('NORMAL',this)">🗺 일반</button>
    <button class="tb" onclick="setType('SATELLITE',this)">🛰 위성</button>
    <button class="tb" onclick="setType('TERRAIN',this)">🗻 지형</button>
    <button class="tb" onclick="setType('HYBRID',this)">🌐 혼합</button>
  </div>
  <div class="btns">
    <div id="compass">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" fill="rgba(12,14,20,0.9)" stroke="#222533" stroke-width="1.5"/>
        <line x1="20" y1="2" x2="20" y2="6" stroke="#5a6070" stroke-width="1"/>
        <line x1="20" y1="34" x2="20" y2="38" stroke="#5a6070" stroke-width="1"/>
        <line x1="2" y1="20" x2="6" y2="20" stroke="#5a6070" stroke-width="1"/>
        <line x1="34" y1="20" x2="38" y2="20" stroke="#5a6070" stroke-width="1"/>
        <text x="20" y="11" text-anchor="middle" font-size="6" font-weight="bold" fill="#ff4757">N</text>
        <text x="20" y="33" text-anchor="middle" font-size="5" fill="#5a6070">S</text>
        <text x="33" y="22" text-anchor="middle" font-size="5" fill="#5a6070">E</text>
        <text x="7" y="22" text-anchor="middle" font-size="5" fill="#5a6070">W</text>
        <g id="needle" transform="rotate(0,20,20)">
          <polygon points="20,4 17,20 20,17 23,20" fill="#ff4757"/>
          <polygon points="20,36 17,20 20,23 23,20" fill="#eef0f5" opacity="0.6"/>
        </g>
      </svg>
    </div>
    <button class="ib on-purple" id="dongBtn" onclick="toggleDong()">🏘</button>
    <button class="ib on-blue" id="preBtn" onclick="toggleMarkers('pre')">🗳</button>
    <button class="ib on-red" id="dayBtn" onclick="toggleMarkers('day')">📍</button>
    <button class="ib" id="lockBtn" onclick="toggleLock()">🔓</button>
    <button class="ib" id="trackBtn" onclick="toggleTracking()">◎</button>
    <button class="ib" onclick="locateOnce()">⊕</button>
  </div>
  <div class="vote-popup pre" id="votePopup">
    <button class="vp-close" onclick="document.getElementById('votePopup').classList.remove('show')">✕</button>
    <div class="vp-type" id="vpType"></div>
    <div class="vp-name" id="vpName"></div>
    <div class="vp-bld" id="vpBld"></div>
    <div class="vp-addr" id="vpAddr"></div>
    <div class="vp-time" id="vpTime"></div>
    <div class="vp-dist" id="vpDist"></div>
  </div>
</div>

<div id="panel">
  <div class="stats">
    <div class="sb hl" id="statR"><div class="sl">반경</div><div class="sv" id="vR">—</div></div>
    <div class="sb"><div class="sl">지름</div><div class="sv" id="vD">—</div></div>
    <div class="sb"><div class="sl">면적</div><div class="sv" id="vA">—</div></div>
  </div>
  <div class="sr">
    <div class="st"><span>반경 조절</span><span id="sv">500 m</span></div>
    <input type="range" id="sl" min="90" max="50000" step="10" value="500" oninput="onSl(this.value)">
  </div>
  <div class="br">
    <div class="ps" id="ps"></div>
    <button class="clr" onclick="clearAll()">🗑 초기화</button>
  </div>
  <div class="ci" id="ci">중심점을 설정하세요</div>
</div>
</div>

<script>
const map=new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.4955,126.8877),
  zoom:14,mapTypeId:naver.maps.MapTypeId.NORMAL,
  scaleControl:false,tilting:true,rotating:true
});

let cM=null,circ=null,eM=null;
let myDot=null,myAcc=null,myArrow=null;
let myLine=null,myLineLbl=null;
let rM=500,watchId=null,isTracking=false,isLocked=false,lastHeading=0;
let myLat=null,myLng=null;
let dongPolygons=[],showDong=true;
const markers={pre:[],day:[]};
const showing={pre:true,day:true};

function calcDist(a,b){
  const R=6371000,r=x=>x*Math.PI/180;
  const dLa=r(b.lat()-a.lat()),dLn=r(b.lng()-a.lng());
  return R*2*Math.atan2(
    Math.sqrt(Math.sin(dLa/2)**2+Math.cos(r(a.lat()))*Math.cos(r(b.lat()))*Math.sin(dLn/2)**2),
    Math.sqrt(1-Math.sin(dLa/2)**2-Math.cos(r(a.lat()))*Math.cos(r(b.lat()))*Math.sin(dLn/2)**2)
  );
}
function fmtDist(m){return m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';}

function updateMyLine(){
  if(!cM||myLat===null){clearMyLine();return;}
  const cPos=cM.getPosition();
  const mPos=new naver.maps.LatLng(myLat,myLng);
  const d=calcDist(mPos,cPos);
  if(!myLine){
    myLine=new naver.maps.Polyline({
      map,path:[mPos,cPos],
      strokeColor:'#f59e0b',strokeWeight:2,
      strokeStyle:'dash',strokeOpacity:.9
    });
  }else{myLine.setPath([mPos,cPos]);myLine.setMap(map);}
  const midLat=(myLat+cPos.lat())/2;
  const midLng=(myLng+cPos.lng())/2;
  const lc=`<div style="background:rgba(12,14,20,0.88);color:#f59e0b;border:1px solid #f59e0b;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;">📏 ${fmtDist(d)}</div>`;
  if(!myLineLbl){
    myLineLbl=new naver.maps.Marker({position:new naver.maps.LatLng(midLat,midLng),map,icon:{content:lc,anchor:new naver.maps.Point(30,12)},zIndex:50});
  }else{myLineLbl.setPosition(new naver.maps.LatLng(midLat,midLng));myLineLbl.setIcon({content:lc,anchor:new naver.maps.Point(30,12)});myLineLbl.setMap(map);}
}
function clearMyLine(){
  if(myLine)myLine.setMap(null);
  if(myLineLbl)myLineLbl.setMap(null);
}

const DAY=parseList(`

function geocodeNaver(addr){
  return new Promise(resolve=>{
    naver.maps.Service.geocode({query:addr},(status,res)=>{
      if(status===naver.maps.Service.Status.OK&&res.v2?.addresses?.length>0){
        const r=res.v2.addresses[0];
        resolve({lat:parseFloat(r.y),lng:parseFloat(r.x)});
      }else resolve(null);
    });
  });
}

function makeVoteMarker(s,type){
  const isPre=type==='pre';
  const color=isPre?'#2563eb':'#ff4757';
  const icon=isPre?'🗳':'📍';
  const m=new naver.maps.Marker({
    position:new naver.maps.LatLng(s.lat,s.lng),map,
    icon:{content:`<div style="background:${color};color:#fff;border:1px solid #fff;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;box-shadow:0 1px 5px rgba(0,0,0,.5);transform:translate(-7px,-7px);cursor:pointer;">${icon}</div>`,anchor:new naver.maps.Point(0,0)},
    zIndex:isPre?31:30
  });
  naver.maps.Event.addListener(m,'click',()=>{
    const popup=document.getElementById('votePopup');
    popup.className=`vote-popup show ${type}`;
    document.getElementById('vpType').textContent=isPre?'🗳 사전투표소 · 구로구':'📍 선거일투표소 · 구로구';
    document.getElementById('vpName').textContent=s.name;
    document.getElementById('vpBld').textContent=s.bld;
    document.getElementById('vpAddr').textContent=s.addr;
    document.getElementById('vpTime').textContent=isPre?'5.29(금)~5.30(토) 06:00~18:00':'6.3(수) 06:00~18:00';
    const vPos=m.getPosition();
    if(myLat!==null&&myLng!==null){
      const d=calcDist(new naver.maps.LatLng(myLat,myLng),vPos);
      document.getElementById('vpDist').textContent=`📏 내 위치에서 ${fmtDist(d)}`;
    }else{
      document.getElementById('vpDist').textContent='📏 내 위치 미확인 (⊕ 버튼 눌러주세요)';
    }
    if(!isLocked){
      rM=100;
      document.getElementById('sl').value=100;
      document.getElementById('sv').textContent='100 m';
      document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
      place(vPos);
      map.setCenter(vPos);
      map.setZoom(17);
    }
  });
  return m;
}

async function initMarkers(type){
  const data=type==='pre'?PRE:DAY;
  for(const s of data){
    if(s.lat&&s.lng){markers[type].push(makeVoteMarker(s,type));continue;}
    const coord=await geocodeNaver(s.addr);
    if(!coord){console.warn('geocode 실패:',s.addr);continue;}
    s.lat=coord.lat;s.lng=coord.lng;
    markers[type].push(makeVoteMarker(s,type));
  }
}
function toggleMarkers(type){
  showing[type]=!showing[type];
  markers[type].forEach(m=>m.setMap(showing[type]?map:null));
  document.getElementById(type==='pre'?'preBtn':'dayBtn')
    .classList.toggle(type==='pre'?'on-blue':'on-red',showing[type]);
}
initMarkers('pre');
initMarkers('day');

const DONG_COLORS=['#a855f7','#06b6d4','#f59e0b','#10b981','#f43f5e','#3b82f6','#84cc16','#f97316','#ec4899','#14b8a6','#8b5cf6','#ef4444'];
async function drawDong(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/raqoon886/Local_HangJeongDong/master/hangjeongdong_%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C.geojson');
    const gj=await res.json();
    gj.features.filter(f=>{
      const p=f.properties;
      return (p.SGG_NM&&p.SGG_NM.includes('구로구'))||(p.sigungu&&p.sigungu.includes('구로구'))||
             (p.adm_nm&&p.adm_nm.includes('구로구'))||(p.SIG_KOR_NM&&p.SIG_KOR_NM.includes('구로구'));
    }).forEach((f,i)=>{
      const color=DONG_COLORS[i%DONG_COLORS.length];
      const arr=f.geometry.type==='MultiPolygon'?f.geometry.coordinates.map(p=>p[0]):[f.geometry.coordinates[0]];
      arr.forEach(ca=>{
        dongPolygons.push(new naver.maps.Polygon({
          map,paths:[ca.map(c=>new naver.maps.LatLng(c[1],c[0]))],
          strokeColor:color,strokeWeight:2,strokeOpacity:.9,fillColor:color,fillOpacity:.12
        }));
      });
    });
  }catch(e){console.error('행정동 로드 실패:',e);}
}
function toggleDong(){
  showDong=!showDong;
  dongPolygons.forEach(p=>p.setMap(showDong?map:null));
  document.getElementById('dongBtn').classList.toggle('on-purple',showDong);
}
drawDong();

function updateCompass(h){lastHeading=h;document.getElementById('needle').setAttribute('transform',`rotate(${h},20,20)`);}
function startCompass(){
  if(!window.DeviceOrientationEvent)return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('deviceorientation',onOrient);});
  }else window.addEventListener('deviceorientation',onOrient);
}
function onOrient(e){updateCompass(e.webkitCompassHeading||e.alpha||0);}
function setType(t,b){document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');map.setMapTypeId(naver.maps.MapTypeId[t]);}
function eLL(c,r){return new naver.maps.LatLng(c.lat(),c.lng()+(r/(6378137*Math.cos(c.lat()*Math.PI/180)))*(180/Math.PI));}
function toggleLock(){
  if(!cM){alert('먼저 중심점을 설정하세요.');return;}
  isLocked=!isLocked;
  const btn=document.getElementById('lockBtn'),badge=document.getElementById('lockBadge'),statR=document.getElementById('statR'),sl=document.getElementById('sl');
  if(isLocked){btn.textContent='🔒';btn.classList.add('locked');badge.classList.add('show');statR.classList.add('locked-stat');sl.disabled=true;if(cM)cM.setOptions({draggable:false});if(eM)eM.setOptions({draggable:false});document.querySelectorAll('.pb').forEach(b=>b.disabled=true);}
  else{btn.textContent='🔓';btn.classList.remove('locked');badge.classList.remove('show');statR.classList.remove('locked-stat');sl.disabled=false;if(cM)cM.setOptions({draggable:true});if(eM)eM.setOptions({draggable:true});document.querySelectorAll('.pb').forEach(b=>b.disabled=false);}
}
function place(pos){
  if(isLocked)return;
  if(cM){cM.setMap(null);circ.setMap(null);eM.setMap(null);}
  cM=new naver.maps.Marker({position:pos,map,icon:{content:'<div style="width:20px;height:20px;background:#03C75A;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 3px rgba(3,199,90,.4);transform:translate(-10px,-10px);cursor:move"></div>',anchor:new naver.maps.Point(0,0)},draggable:true});
  circ=new naver.maps.Circle({map,center:pos,radius:rM,strokeColor:'#03C75A',strokeWeight:2,strokeStyle:'dash',strokeOpacity:.9,fillColor:'#03C75A',fillOpacity:.08});
  eM=new naver.maps.Marker({position:eLL(pos,rM),map,icon:{content:'<div style="width:16px;height:16px;background:#fff;border:3px solid #2563eb;border-radius:50%;box-shadow:0 0 0 3px rgba(37,99,235,.3);transform:translate(-8px,-8px);cursor:ew-resize"></div>',anchor:new naver.maps.Point(0,0)},draggable:true});
  naver.maps.Event.addListener(cM,'drag',e=>{if(isLocked)return;circ.setCenter(e.coord);eM.setPosition(eLL(e.coord,rM));upd(e.coord);updateMyLine();});
  naver.maps.Event.addListener(eM,'drag',e=>{if(isLocked)return;const c=cM.getPosition();rM=Math.max(90,Math.min(50000,Math.round(calcDist(c,e.coord))));circ.setRadius(rM);document.getElementById('sl').value=rM;upd(c);});
  upd(pos);updateMyLine();
}
naver.maps.Event.addListener(map,'click',e=>{if(!isLocked)place(e.coord);});
function updateMyDot(lat,lng,acc,heading){
  myLat=lat;myLng=lng;
  const pos=new naver.maps.LatLng(lat,lng);
  const arrow=`<div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:22px solid #2563eb;transform:translate(-8px,-20px) rotate(${heading}deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"></div>`;
  const dot='<div style="width:16px;height:16px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(37,99,235,.3);transform:translate(-8px,-8px)"></div>';
  if(!myDot){myDot=new naver.maps.Marker({position:pos,map,icon:{content:dot,anchor:new naver.maps.Point(0,0)},zIndex:20});myAcc=new naver.maps.Circle({map,center:pos,radius:acc,strokeColor:'#2563eb',strokeWeight:1,strokeOpacity:.4,fillColor:'#2563eb',fillOpacity:.06});myArrow=new naver.maps.Marker({position:pos,map,icon:{content:arrow,anchor:new naver.maps.Point(0,0)},zIndex:21});}
  else{myDot.setPosition(pos);myAcc.setCenter(pos);myAcc.setRadius(acc);myArrow.setPosition(pos);myArrow.setIcon({content:arrow,anchor:new naver.maps.Point(0,0)});}
  updateMyLine();
}
function toggleTracking(){isTracking?stopTracking():startTracking();}
function startTracking(){
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  isTracking=true;document.getElementById('trackBtn').classList.add('tracking');startCompass();
  watchId=navigator.geolocation.watchPosition(
    pos=>{const{latitude:lat,longitude:lng,accuracy:acc,heading:h}=pos.coords;const heading=h!=null?h:lastHeading;updateMyDot(lat,lng,acc,heading);updateCompass(heading);if(isTracking)map.setCenter(new naver.maps.LatLng(lat,lng));},
    ()=>stopTracking(),{enableHighAccuracy:true,maximumAge:500,timeout:10000}
  );
}
function stopTracking(){isTracking=false;document.getElementById('trackBtn').classList.remove('tracking');if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}}
function locateOnce(){
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
      const ll=new naver.maps.LatLng(lat,lng);
      map.setCenter(ll);map.setZoom(15);
      updateMyDot(lat,lng,acc,lastHeading);
      if(!isLocked)place(ll);
    },
    ()=>alert('위치를 가져올 수 없습니다.')
  );
}
function upd(p){
  document.getElementById('vR').textContent=fmtDist(rM);
  document.getElementById('vD').textContent=fmtDist(rM*2);
  const fa=m=>m>=1e6?(m/1e6).toFixed(2)+' km²':m>=10000?(m/10000).toFixed(1)+' ha':Math.round(m)+' m²';
  document.getElementById('vA').textContent=fa(Math.PI*rM*rM);
  document.getElementById('sv').textContent=fmtDist(rM);
  document.getElementById('ci').textContent=`중심: ${p.lat().toFixed(5)}°N, ${p.lng().toFixed(5)}°E`;
}
function onSl(v){if(isLocked)return;rM=parseInt(v);document.getElementById('sv').textContent=fmtDist(rM);if(circ){circ.setRadius(rM);eM.setPosition(eLL(cM.getPosition(),rM));upd(cM.getPosition());}}

// ✅ 프리셋 버튼 90m·100m 추가
[{l:'90m',v:90},{l:'100m',v:100},{l:'200m',v:200},{l:'500m',v:500},{l:'1km',v:1000},{l:'3km',v:3000},{l:'5km',v:5000},{l:'10km',v:10000}].forEach(p=>{
  const b=document.createElement('button');b.className='pb';b.textContent=p.l;
  b.onclick=()=>{if(isLocked)return;document.querySelectorAll('.pb').forEach(x=>x.classList.remove('on'));b.classList.add('on');rM=p.v;document.getElementById('sl').value=p.v;if(circ){circ.setRadius(p.v);eM.setPosition(eLL(cM.getPosition(),p.v));upd(cM.getPosition());}else document.getElementById('sv').textContent=fmtDist(p.v);};
  document.getElementById('ps').appendChild(b);
});

function clearAll(){
  isLocked=false;document.getElementById('lockBtn').textContent='🔓';document.getElementById('lockBtn').classList.remove('locked');
  document.getElementById('lockBadge').classList.remove('show');document.getElementById('statR').classList.remove('locked-stat');
  document.getElementById('sl').disabled=false;document.querySelectorAll('.pb').forEach(b=>b.disabled=false);
  if(cM){cM.setMap(null);circ.setMap(null);eM.setMap(null);cM=circ=eM=null;}
  clearMyLine();
  ['vR','vD','vA'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('ci').textContent='중심점을 설정하세요';
}
async function doSearch(){
  const raw=document.getElementById('si').value.trim();if(!raw)return;
  const q=raw.replace(/\s+/g,' ');
  const coord=await geocodeNaver(q);
  if(coord){
    const ll=new naver.maps.LatLng(coord.lat,coord.lng);
    map.setCenter(ll);map.setZoom(17);if(!isLocked)place(ll);
    document.getElementById('si').value='';return;
  }
  const tries=[q,q+' 서울','서울 구로구 '+q];
  for(const query of tries){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=ko&countrycodes=kr`,{headers:{'Accept-Language':'ko'}});
      const d=await r.json();
      if(d&&d.length){
        const hit=d.find(x=>x.display_name&&x.display_name.includes('서울'))||d[0];
        const ll=new naver.maps.LatLng(parseFloat(hit.lat),parseFloat(hit.lon));
        map.setCenter(ll);map.setZoom(16);if(!isLocked)place(ll);
        document.getElementById('si').value='';return;
      }
    }catch(e){}
    await new Promise(r=>setTimeout(r,100));
  }
  alert('검색 결과가 없습니다.');
}
startCompass();
</script>
